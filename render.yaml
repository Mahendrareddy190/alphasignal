services:
  - type: web
    name: alphasignal
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /tmp/futures.db
      - key: EMAIL_USER
        value: mrmahicrypto@gmail.com
      - key: EMAIL_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OTP_EXPIRY_MINUTES
        value: "10"
